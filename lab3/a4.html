<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      n = parseInt(prompt("Enter A number :- "));
      a = 0;
      b = 1;

      for (i = 1; i <= n; i++) {
        next = a + b;
        document.write(a);
        document.write(" ");
        a = b;
        b = next;
      }
    </script>
  </body>
</html>
