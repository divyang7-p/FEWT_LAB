<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      a = parseInt(prompt("Enter a integer number :- "));
      isprime = true;
      for (i = 2; i < a; i++) {
        if (a % i == 0) {
          isprime = false;
          break;
        } else {
          isprime = true;
        }
      }

      if (isprime) {
        alert("Number Is prime..");
      } else {
        alert("number is not prime..");
      }
    </script>
  </body>
</html>
