<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        n=parseInt(prompt("Enter A number :- "))
        temp=n;
        rem=0;
        reverse=0;
        while(n!=0){
            rem=n%10;
            reverse=reverse*10+rem;
            n=parseInt(n/10);
        }
        if(reverse==temp){
            document.write("palindrome..");
        }
        else{
            document.write("Not palindrome..");
        }
    </script>
</body>
</html>
