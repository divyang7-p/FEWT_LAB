<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function print(ans){
            document.writeln(ans+"</br>");
        }
        function calculator(a,b,myprint){
            add=a+b;
            myprint(add);
        }
        calculator(5,4,print);
        calculator(6,4,print);
    </script>
</body>
</html>
