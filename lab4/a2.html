<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
        a=parseInt(prompt())
        b=parseInt(prompt())
        isprime=true
        for(i=a;i<=b;i++){
            for(j=2;j<i;j++){
                if(i%j==0){
                    isprime=false
                    break
                }
                isprime=true;
            }
            if(isprime){
                document.write(i+" ")
            }
        }
    </script>
  </body>
</html>
