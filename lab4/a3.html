<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        for(i=4;i>=1;i--){
            for(j=1;j<=i;j++){
                document.write(j+" ");
            }
            document.write("<br/>")
        }
         document.write("<br/>")
         document.write("<br/>")
         for(i=1;i<=4;i++){
            for(j=1;j<=i;j++){
                if((i+j)%2==0){
                    document.write("1"+" ")
                }
                else{
                    document.write("0"+" ")
                }
            }
            document.write("<br/>")
         }
         document.write("<br/>")
         document.write("<br/>")
         for(i=1;i<=5;i++){
            for(j=1;j<=5-i;j++){
                document.write("&nbsp")
            }
            for(k=1;k<=i;k++){
                document.write("*")
            }
            document.write("<br/>")
         }
    </script>
</body>
</html>
