<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        a=parseInt(prompt("Enter Two digit number :- "))
            rem=a%10;
            a=parseInt(a/10);
            document.write(parseInt(Math.pow(a,rem)))
    </script>
</body>
