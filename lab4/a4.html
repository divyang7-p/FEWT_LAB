<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        a=parseInt(prompt())
        b=parseInt(prompt())
        small=(a>b)?a:b;
        for(i=small;i>1;i--){
            if(a%i==0  && b%i==0){
                document.write(i+" Is The GCD OF "+a+" and "+b)
            }
        }
    </script>
</body>
</html>
