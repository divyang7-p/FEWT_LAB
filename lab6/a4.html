<html lang="en">
  <head>

  </head>
  <body>
 <script>
     product=[
    {
        name :"IQ NEO 10",

        price :"41999"

    {
        name :"GOOGLE PIXEL 9",
        image :"https://encrypted-tbn1.gstatic.com/shopping?q=tbn:ANd9GcSSmJLbqCDZZTCzuwgvY7972U0NoaTM9iySEntQCdTDAEJZ8IsFqvLvLLcaP3kUmyr9l5GVQyLE4Iy5MDbesoPYi198IP29E3tx2dmBgX9YobyZKoRHrVZQmA",

        price :"37000rs"
    },]
    for(i=0;i<product.length;i++){
    document.write(`<div class="card" style="width: 18rem;">
  <img src="${product[i].image}" class="card-img-top" alt="..."/>
  <div class="card-body">
    <h5 class="card-title">${product[i].name}</h5>
    <p class="card-text">${product[i].price}</p>
    <a href="#" class="btn btn-primary">Go somewhere</a>
  </div>
</div>`)
    }
   </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
