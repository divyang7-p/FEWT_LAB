<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        n=parseInt(prompt("Enter count Of Number :- "));
        a=[]
        for(i=0;i<n;i++){
            a.push(prompt("Enter Number :- "));
        }
     
        max=a[0];
        for(i=0;i<n;i++){
            if(a[i]>max){
                max=a[i];
            }
        }
        document.write(max);
    </script>
</body>
</html>
