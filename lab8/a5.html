<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="btn" onclick="mevent(event)">Click</button>
    <h1 id="key">Key</h1>
    <script>
        function mevent(e){
            document.getElementById("btn").addEventListener("click",function(){
                document.getElementById("key").style.color="blue";
            })
            document.getElementById("btn").addEventListener("dblclick",function(){
                document.getElementById("key").style.fontStyle="italic"
            })
            
        }
    </script>
</body>
</html>
